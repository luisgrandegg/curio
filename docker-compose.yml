# Curio self-hosted stack: API + the always-on Pip agent + Caddy (auto-HTTPS).
# Web is hosted separately on Vercel. See docs/adr/0005 + docs/deploy/vps.md.
# Configure everything via .env (copy from .env.example) — never commit secrets.
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    expose:
      - "3001" # internal only; published via Caddy with HTTPS
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    env_file: .env
    # Persistent LiveKit worker — must never sleep/scale-to-zero.
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      - API_DOMAIN=${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
